            padding: 15px;
            margin-bottom: 15px;
        }
        .config-row {

            gap: 15px;
            align-items: center;
            margin-bottom: 10px;
        }

        .config-item { display: flex; flex-direction: column; gap: 4px; }
        .config-item label { font-size: 12px; color: #666; font-weight: bold; }
        .config-item select, .config-item input {
            padding: 6px 10px;

            border-radius: 5px;

        .mode-checks { display: flex; gap: 12px; flex-wrap: wrap; }

        .mode-checks label:hover { background: #e8f5e8; }

        button {

        .btn-primary { background: #4CAF50; color: white; }
        .btn-primary:hover:not(:disabled) { background: #43A047; }
        .btn-secondary { background: #2196F3; color: white; }
        .btn-secondary:hover:not(:disabled) { background: #1E88E5; }
        .btn-warning { background: #FF9800; color: white; }
        .btn-warning:hover:not(:disabled) { background: #F57C00; }
        .btn-danger { background: #f44336; color: white; }
        .btn-danger:hover:not(:disabled) { background: #D32F2F; }
        .btn-history { background: #9C27B0; color: white; }
        .btn-history:hover:not(:disabled) { background: #7B1FA2; }

        .result-panel h2 { text-align: center; color: #333; margin-bottom: 12px; font-size: 18px; }
        .result-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; }
        .summary-item { text-align: center; padding: 10px; background: white; border-radius: 6px; border: 1px solid #e0e0e0; }
        .summary-number { font-size: 28px; font-weight: bold; margin-bottom: 3px; }
        .summary-label { font-size: 11px; color: #666; }
        .summary-correct .summary-number { color: #4CAF50; }
        .summary-wrong .summary-number { color: #f44336; }
        .summary-unanswered .summary-number { color: #FF9800; }

        .correction-item .wrong-info { color: #f44336; font-size: 11px; }

        .celebration h2 { font-size: 22px; margin-bottom: 10px; }
        .celebration p { font-size: 14px; opacity: 0.9; }

        .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #999; padding: 0; }

                {p:'kē',w:'科'},{p:'xué',w:'学'},{p:'jì',w:'技'},{p:'shù',w:'术'},{p:'wén',w:'文'},{p:'huà',w:'化'},{p:'yì',w:'艺'},{p:'shù',w:'术'},
                {p:'lì',w:'历'},{p:'shǐ',w:'史'},{p:'dì',w:'地'},{p:'lǐ',w:'理'},{p:'zhèng',w:'政'},{p:'zhì',w:'治'},{p:'jīng',w:'经'},{p:'jì',w:'济'},
                {p:'yùn',w:'运'},{p:'dòng',w:'动'},{p:'bǐ',w:'比'},{p:'sài',w:'赛'},{p:'yíng',w:'赢'},{p:'shū',w:'输'},{p:'shèng',w:'胜'},{p:'fù',w:'负'}
            ]
        };

        // 状态
        let questions = [];
        let userAnswers = [];
        let wrongQuestions = [];
        let currentStage = 'practice';
        let practiceStartTime = null;
        let practiceEndTime = null;
        let correctionRound = 0;
        let timerInterval = null;
        let timerTotalSeconds = 0;
        let timerRemainingSeconds = 0;

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function generateQuestions() {
            const grade = document.getElementById('gradeSelect').value;
            const count = parseInt(document.getElementById('countSelect').value);
            const bank = WORD_BANK[grade] || WORD_BANK['3'];
            // 去重：同拼音可能对应多字，按"拼音+字"组合去重
            const unique = [];
            const seen = new Set();
            for (const w of bank) {
                const key = w.p + '|' + w.w;
                if (!seen.has(key)) { seen.add(key); unique.push(w); }
            }
            questions = shuffleArray(unique).slice(0, Math.min(count, unique.length));
            userAnswers = new Array(questions.length).fill(null);
        }

        function renderQuestions() {
            const grid = document.getElementById('questionsGrid');
            grid.innerHTML = '';
            const showPinyin = document.getElementById('modePinyin').checked;
            const listenMode = document.getElementById('modeListen').checked;
            questions.forEach((q, index) => {
                const item = document.createElement('div');
                item.className = 'question-item';
                item.id = `question-${index}`;
                const pinyinDisplay = showPinyin ? q.p : (listenMode ? '🔊' : '？');
                item.innerHTML = `
                    <div class="question-top">
                        <div class="question-number">${index + 1}</div>
                        <div class="pinyin" data-pinyin="${q.p}">${pinyinDisplay}</div>
                    </div>
                    <input type="text" class="answer-input" id="answer-${index}"
                           placeholder="写汉字" onchange="saveAnswer(${index})"
                           onkeypress="handleEnter(event, ${index})">
                    ${listenMode ? `<button class="btn-secondary" style="padding:2px 8px;font-size:11px;width:100%;" onclick="speak('${q.p}', ${index})">🔊 朗读</button>` : ''}
                `;
                grid.appendChild(item);
            });
            const first = document.getElementById('answer-0');
            if (first) first.focus();
        }

        function saveAnswer(index) {
            const input = document.getElementById(`answer-${index}`);
            userAnswers[index] = input.value.trim();
        }

        function handleEnter(e, idx) {
            if (e.key === 'Enter') {
                e.preventDefault();
                saveAnswer(idx);
                const next = idx + 1;
                if (next < questions.length) document.getElementById(`answer-${next}`)?.focus();
                else submitAnswers();
            }
        }

        // 朗读功能（Web Speech API）
        function speak(pinyin, index) {
            if (!('speechSynthesis' in window)) { alert('浏览器不支持语音朗读'); return; }
            // 用拼音近似朗读（中文 TTS 读拼音效果有限，部分浏览器可读）
            // 更好：朗读对应的汉字，但听写模式应隐藏答案。这里朗读拼音字母。
            const u = new SpeechSynthesisUtterance(pinyin);
            u.lang = 'zh-CN';
            u.rate = 0.7;
            speechSynthesis.cancel();
            speechSynthesis.speak(u);
        }

        function speakAll() {
            if (!('speechSynthesis' in window)) { alert('浏览器不支持语音'); return; }
            let i = 0;
            function next() {
                if (i >= questions.length) return;
                const u = new SpeechSynthesisUtterance(questions[i].p);
                u.lang = 'zh-CN'; u.rate = 0.6;
                u.onend = () => { i++; setTimeout(next, 800); };
                speechSynthesis.cancel();
                speechSynthesis.speak(u);
            }
            next();
        }

        function startTimer(minutes) {
            if (timerInterval) clearInterval(timerInterval);
            timerTotalSeconds = minutes * 60;
            timerRemainingSeconds = timerTotalSeconds;
            const bar = document.getElementById('timerBar');
            bar.classList.add('show');
            bar.classList.remove('urgent');
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timerRemainingSeconds--;
                updateTimerDisplay();
                if (timerRemainingSeconds <= 60) bar.classList.add('urgent');
                if (timerRemainingSeconds <= 0) {
                    clearInterval(timerInterval);
                    if (currentStage === 'practice') {
                        alert('⏰ 时间到！自动提交批改。');
                        submitAnswers();
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerRemainingSeconds / 60);
            const s = timerRemainingSeconds % 60;
            document.getElementById('timerBar').textContent = `⏱️ 剩余时间：${m}:${s.toString().padStart(2,'0')}`;
        }

        function startNewPractice() {
            generateQuestions();
            renderQuestions();
            resetUI();
            practiceStartTime = new Date();
            currentStage = 'practice';
            correctionRound = 0;
            updateStageIndicator();
            const timerMin = parseInt(document.getElementById('timerSelect').value);
            if (timerMin > 0) startTimer(timerMin);
            else { document.getElementById('timerBar').classList.remove('show'); if(timerInterval) clearInterval(timerInterval); }
        }

        function resetUI() {
            document.getElementById('resultPanel').classList.remove('show');
            document.getElementById('correctionSection').classList.remove('show');
            document.getElementById('celebration').classList.remove('show');
            document.getElementById('questionsGrid').style.display = 'grid';
            document.getElementById('btnSubmit').style.display = 'inline-block';
            document.getElementById('btnSubmit').disabled = false;
            document.getElementById('btnCorrect').style.display = 'none';
            document.getElementById('btnSubmitCorrection').style.display = 'none';
        }

        function updateStageIndicator() {
            ['stage1','stage2','stage3'].forEach((s, i) => {
                const el = document.getElementById(s);
                el.classList.remove('active','completed');
                if (currentStage === 'practice' && i === 0) el.classList.add('active');
                else if (currentStage === 'review' && i === 1) el.classList.add('active');
                else if (currentStage === 'correction' && i === 2) el.classList.add('active');
                else if ((currentStage === 'review' && i === 0) || (currentStage === 'correction' && i < 2)) el.classList.add('completed');
            });
        }

        function submitAnswers() {
            practiceEndTime = new Date();
            if (timerInterval) { clearInterval(timerInterval); document.getElementById('timerBar').classList.remove('show'); }
            let correctCount = 0, wrongCount = 0, unansweredCount = 0;
            wrongQuestions = [];
            questions.forEach((q, index) => {
                const item = document.getElementById(`question-${index}`);
                const input = document.getElementById(`answer-${index}`);
                const ua = (userAnswers[index] !== null ? userAnswers[index] : (input ? input.value.trim() : ''));
                item.classList.remove('correct','wrong');
                if (!ua) {
                    unansweredCount++; wrongCount++;
                    item.classList.add('wrong');
                    wrongQuestions.push({index, question: q, userAnswer: '未作答', correctAnswer: q.w});
                    input.disabled = true;
                    input.value = `×${q.w}`;
                } else if (ua === q.w) {
                    correctCount++;
                    item.classList.add('correct');
                    input.disabled = true;
                } else {
                    wrongCount++;
                    item.classList.add('wrong');
                    wrongQuestions.push({index, question: q, userAnswer: ua, correctAnswer: q.w});
                    input.disabled = true;
                    input.value = `${ua}×`;
                }
            });
            currentStage = 'review';
            updateStageIndicator();
            const total = questions.length;
            const correctRate = Math.round(correctCount / total * 100);
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;
            document.getElementById('unansweredCount').textContent = unansweredCount;
            document.getElementById('scoreText').textContent = correctRate;
            const minutes = Math.max(1, Math.round((practiceEndTime - practiceStartTime) / 60000));
            let html = `<h3>📋 答题统计</h3><p>用时：约 ${minutes} 分钟 | 正确率：${correctRate}% | 错字：${wrongCount} 个</p>`;
            if (wrongQuestions.length > 0) html += `<p style="color:#f44336;">⚠️ 有 ${wrongQuestions.length} 个错字需要订正</p>`;
            else html += `<p style="color:#4CAF50;">🎉 全部正确！</p>`;
            document.getElementById('resultDetail').innerHTML = html;
            document.getElementById('resultPanel').classList.add('show');
            saveToHistory(correctCount, wrongCount, unansweredCount, correctRate, minutes);
            document.getElementById('btnSubmit').disabled = true;
            if (wrongQuestions.length > 0) document.getElementById('btnCorrect').style.display = 'inline-block';
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function startCorrection() {
            correctionRound++;
            currentStage = 'correction';
            updateStageIndicator();
            document.getElementById('questionsGrid').style.display = 'none';
            document.getElementById('correctionSection').classList.add('show');
            document.getElementById('celebration').classList.remove('show');
            document.getElementById('btnCorrect').style.display = 'none';
            document.getElementById('btnSubmitCorrection').style.display = 'inline-block';
            document.getElementById('correctionInfo').innerHTML = `第 <strong>${correctionRound}</strong> 轮订正，共 <strong>${wrongQuestions.length}</strong> 个错字`;
            renderCorrection();
        }

        function renderCorrection() {
            const grid = document.getElementById('correctionGrid');
            grid.innerHTML = '';
            wrongQuestions.forEach((wq) => {
                const item = document.createElement('div');
                item.className = 'correction-item';
                item.id = `correction-${wq.index}`;
                item.innerHTML = `
                    <div class="wrong-info"><s>${wq.userAnswer}</s> → 正确：${wq.correctAnswer}</div>
                    <div class="pinyin">${wq.question.p}</div>
                    <input type="text" class="answer-input" id="correction-answer-${wq.index}" placeholder="订正">
                `;
                grid.appendChild(item);
            });
            const first = document.getElementById(`correction-answer-${wrongQuestions[0].index}`);
            if (first) first.focus();
        }

        function submitCorrection() {
            let stillWrong = [];
            wrongQuestions.forEach((wq) => {
                const input = document.getElementById(`correction-answer-${wq.index}`);
                const item = document.getElementById(`correction-${wq.index}`);
                const na = input.value.trim();
                item.classList.remove('corrected');
                if (na === wq.correctAnswer) {
                    item.classList.add('corrected');
                    input.disabled = true;
                    input.style.borderColor = '#4CAF50';
                } else {
                    stillWrong.push({...wq, userAnswer: na || '未订正'});
                    input.disabled = true;
                    input.value = `${na||'×'}→${wq.correctAnswer}`;
                }
            });
            if (stillWrong.length === 0) {
                document.getElementById('btnSubmitCorrection').style.display = 'none';
                document.getElementById('celebration').classList.add('show');
                document.getElementById('celebrationText').textContent = `经过 ${correctionRound} 轮订正，所有错字都已正确订正！`;
                updateHistoryWithCorrection(correctionRound);
                currentStage = 'review';
                updateStageIndicator();
            } else {
                wrongQuestions = stillWrong;
                document.getElementById('correctionInfo').innerHTML = `第 <strong>${correctionRound}</strong> 轮完成，还有 <strong style="color:#f44336;">${stillWrong.length}</strong> 个错字`;
                document.getElementById('btnSubmitCorrection').textContent = '📝 继续订正';
                document.getElementById('btnSubmitCorrection').onclick = continueCorrection;
            }
        }

        function continueCorrection() {
            correctionRound++;
            document.getElementById('correctionInfo').innerHTML = `第 <strong>${correctionRound}</strong> 轮订正，还有 <strong>${wrongQuestions.length}</strong> 个错字`;
            renderCorrection();
            document.getElementById('btnSubmitCorrection').textContent = '✅ 提交订正';
            document.getElementById('btnSubmitCorrection').onclick = submitCorrection;
        }

        function clearAnswers() {
            if (currentStage !== 'practice') return;
            questions.forEach((q, index) => {
                const input = document.getElementById(`answer-${index}`);
                const item = document.getElementById(`question-${index}`);
                if (input) { input.value=''; input.disabled=false; }
                if (item) item.classList.remove('correct','wrong');
            });
            userAnswers = new Array(questions.length).fill(null);
        }

        function saveToHistory(correct, wrong, unanswered, correctRate, minutes) {
            const h = JSON.parse(localStorage.getItem('chineseWordsHistory') || '[]');
            h.unshift({
                id: Date.now(), date: new Date().toLocaleString('zh-CN'),
                correct, wrong, unanswered, correctRate, score: correctRate, minutes,
                grade: document.getElementById('gradeSelect').value,
                wrongWords: wrongQuestions.map(wq => ({p: wq.question.p, user: wq.userAnswer, correct: wq.correctAnswer})),
                correctionRounds: 0, fullyCorrected: wrongQuestions.length === 0
            });
            if (h.length > 20) h.pop();
            localStorage.setItem('chineseWordsHistory', JSON.stringify(h));
        }

        function updateHistoryWithCorrection(rounds) {
            const h = JSON.parse(localStorage.getItem('chineseWordsHistory') || '[]');
            if (h.length > 0) {
                h[0].correctionRounds = rounds;
                h[0].fullyCorrected = true;
                localStorage.setItem('chineseWordsHistory', JSON.stringify(h));
            }
        }

        function showHistory() {
            const h = JSON.parse(localStorage.getItem('chineseWordsHistory') || '[]');
            const list = document.getElementById('historyList');
            if (h.length === 0) { list.innerHTML = '<div class="no-history">暂无历史记录</div>'; }
            else {
                list.innerHTML = h.map(r => `
                    <div class="history-item">
                        <div class="history-header">
                            <span class="history-date">${r.date} · ${r.grade||'?'}年级</span>
                            <span class="history-score" style="color:${r.correctRate>=90?'#4CAF50':r.correctRate>=60?'#FF9800':'#f44336'}">${r.correctRate||r.score}%</span>
                        </div>
                        <div class="history-stats">
                            <span>✅${r.correct}</span><span>❌${r.wrong}</span><span>⏱️${r.minutes}分钟</span>
                            ${r.fullyCorrected ? (r.correctionRounds>0?`<span style="color:#4CAF50;">📝已订正(${r.correctionRounds}轮)</span>`:`<span style="color:#4CAF50;">🎉首次全对</span>`) : `<span style="color:#f44336;">⚠️未完成</span>`}
                        </div>
                        ${r.wrongWords && r.wrongWords.length>0 ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid #e0e0e0;"><h4 style="color:#f44336;font-size:12px;margin-bottom:4px;">❌ 错字：</h4>${r.wrongWords.map(w=>`<div class="wrong-word">${w.p}：<s>${w.user}</s> → ${w.correct}</div>`).join('')}</div>` : ''}
                    </div>`).join('');
            }
            document.getElementById('historyModal').classList.add('show');
        }

        function closeHistory() { document.getElementById('historyModal').classList.remove('show'); }
        document.getElementById('historyModal').addEventListener('click', function(e){ if(e.target===this) closeHistory(); });

        window.onload = function() { startNewPractice(); };
    </script>
</body>
</html>
