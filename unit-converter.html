<script>
// 每类单位：以 [基准单位]=1 定义相对值。温度单独处理。
const UNITS = {
  length: {name:'长度', base:'m', items:{
    mm:0.001, cm:0.01, dm:0.1, m:1, km:1000,
    '英寸(in)':0.0254, '英尺(ft)':0.3048, '码(yd)':0.9144, '英里(mi)':1609.344,
    '里':500, '丈':3.3333, '尺':0.3333, '寸':0.03333,
    '海里(nmi)':1852
  }},
  weight: {name:'重量', base:'kg', items:{
    mg:0.000001, g:0.001, kg:1, t:1000,
    '克拉(ct)':0.0002, '两':0.05, '斤':0.5,
    '盎司(oz)':0.0283495, '磅(lb)':0.453592, '英吨(t-uk)':1016.047
  }},
  area: {name:'面积', base:'m²', items:{
    'mm²':0.000001,'cm²':0.0001,'dm²':0.01,'m²':1,'km²':1000000,
    '公顷(ha)':10000,'亩':666.6667,'英亩(acre)':4046.86,
    '平方英尺(ft²)':0.092903,'平方英寸(in²)':0.00064516
  }},
  time: {name:'时间', base:'s', items:{
    '毫秒(ms)':0.001,'秒(s)':1,'分(min)':60,'时(h)':3600,'天(d)':86400,
    '周(wk)':604800,'月(30d)':2592000,'年(yr)':31536000
  }},
  data: {name:'数据存储', base:'B', items:{
    'bit':0.125,'B(字节)':1,'KB':1024,'MB':1048576,'GB':1073741824,
    'TB':1099511627776,'PB':1125899906842624
  }}
};

// 温度单独函数
const TEMP = ['摄氏(°C)','华氏(°F)','开尔文(K)'];

let currentCat = 'length';

function toBase(cat, val, unit){
  if(cat==='temp') return null;
  return val * UNITS[cat].items[unit];
}
function fromBase(cat, baseVal, unit){
  if(cat==='temp') return null;
  return baseVal / UNITS[cat].items[unit];
}
function convertTemp(val, from, to){
  let c;
  if(from==='摄氏(°C)') c=val;
  else if(from==='华氏(°F)') c=(val-32)*5/9;
  else c=val-273.15;
  if(to==='摄氏(°C)') return c;
  if(to==='华氏(°F)') return c*9/5+32;
  return c+273.15;
}

function fillUnits(){
  const fromSel=document.getElementById('fromUnit');
  const toSel=document.getElementById('toUnit');
  fromSel.innerHTML='';toSel.innerHTML='';
  let keys;
  if(currentCat==='temp'){
    keys=TEMP;
  } else {
    keys=Object.keys(UNITS[currentCat].items);
  }
  keys.forEach(k=>{
    fromSel.appendChild(new Option(k,k));
    toSel.appendChild(new Option(k,k));
  });
  if(keys.length>1){ toSel.selectedIndex=1; }
}

function doConvert(){
  const v=parseFloat(document.getElementById('fromVal').value);
  const f=document.getElementById('fromUnit').value;
  const t=document.getElementById('toUnit').value;
  if(isNaN(v)){ document.getElementById('result').textContent='请输入数字'; return; }
  let out;
  if(currentCat==='temp'){
    out=convertTemp(v,f,t);
    document.getElementById('formula').textContent=`换算：${v} ${f} = ${out.toFixed(2).replace(/\.?0+$/,'')} ${t}`;
  } else {
    const base=toBase(currentCat,v,f);
    out=fromBase(currentCat,base,t);
    document.getElementById('formula').textContent=`1 ${f} = ${(UNITS[currentCat].items[f]/UNITS[currentCat].items[t]).toPrecision(6)} ${t}`;
  }
  let display=Math.abs(out)>=1e9||Math.abs(out)<1e-4? out.toExponential(4): parseFloat(out.toPrecision(8));
  document.getElementById('result').innerHTML=`<b>${display}</b> ${t}`;
  renderQuick(v,f);
}

function renderQuick(v,from){
  const qc=document.getElementById('quick');qc.innerHTML='';
  if(currentCat==='temp'){ qc.style.display='none';return;}
  qc.style.display='flex';
  const items=UNITS[currentCat].items;
  const base=toBase(currentCat,v,from);
  Object.keys(items).forEach(u=>{
    const r=fromBase(currentCat,base,u);
    const d=Math.abs(r)>=1e9||Math.abs(r)<1e-4? r.toExponential(3):parseFloat(r.toPrecision(6));
    const span=document.createElement('span');
    span.textContent=`${d} ${u}`;
    qc.appendChild(span);
  });
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentCat=tab.dataset.cat;
    fillUnits();doConvert();
  };
});
document.getElementById('swapBtn').onclick=()=>{
  const f=document.getElementById('fromUnit'),t=document.getElementById('toUnit');
  const fi=f.selectedIndex,ti=t.selectedIndex;
  f.selectedIndex=ti;t.selectedIndex=fi;doConvert();
};
document.getElementById('fromVal').oninput=doConvert;
document.getElementById('fromUnit').onchange=doConvert;
document.getElementById('toUnit').onchange=doConvert;

fillUnits();doConvert();
</script>
