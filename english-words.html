        const GRADE_NAMES = { 3: '三年级', 4: '四年级', 5: '五年级', 6: '六年级' };

        // ============================================================
        // 词汇过滤：根据年级和范围
        // ============================================================
        function getWordPool() {
            const grade = parseInt(document.getElementById('gradeSelect').value);
            const range = document.getElementById('rangeSelect').value;
            if (range === 'current') {
                return WORDS.filter(w => w.grade === grade);
            } else if (range === 'cumulative') {
                return WORDS.filter(w => w.grade <= grade);
            }
            return WORDS.slice();
        }

        // 从错题本取词（跨年级）
        function getWrongWordPool() {
            const book = JSON.parse(localStorage.getItem('englishWordbook') || '[]');
            // book 中存的是 {english, chinese, grade}；用 english 反查原表，避免遗漏
            return book.map(b => {
                const found = WORDS.find(w => w.english.toLowerCase() === b.english.toLowerCase());
                return found || b;
            });
        }

        function onGradeChange() {
            const grade = parseInt(document.getElementById('gradeSelect').value);
            const pool = WORDS.filter(w => w.grade === grade);
            document.getElementById('subtitle').textContent =
                `${GRADE_NAMES[grade]} · 本级 ${pool.length} 个词汇 | 看中拼英 / 看英选中 / 听写`;
        }

        function onRangeChange() { onGradeChange(); }

        function onTimerToggle() {
            const enabled = document.getElementById('timerEnable').checked;
            document.getElementById('timerMinutes').style.display = enabled ? 'inline-block' : 'none';
        }

        function getSelectedMode() {
            const checked = document.querySelector('input[name="mode"]:checked');
            return checked ? checked.value : 'spell';
        }

        function shuffleArray(array) {
            const a = [...array];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        // 生成干扰选项（选择题用，从同池中随机取）
        function generateDistractors(correctWord, pool, count) {
            const others = pool.filter(w => w.english.toLowerCase() !== correctWord.english.toLowerCase());
            const shuffled = shuffleArray(others);
            return shuffled.slice(0, count);
        }

        // ============================================================
        // 开始新练习
        // ============================================================
        function startNewPractice() {
            stopTimer();
            const wrongOnly = document.getElementById('wrongOnly').checked;
            let pool = wrongOnly ? getWrongWordPool() : getWordPool();

            if (pool.length === 0) {
                alert(wrongOnly ? '错题本为空，请先做一次练习产生错题。' : '当前词汇范围为空。');
                return;
            }

            const count = Math.min(parseInt(document.getElementById('countSelect').value) || 20, pool.length);
            const mode = getSelectedMode();

            // 题目构建
            let qs = shuffleArray(pool).slice(0, count).map(word => {
                const q = { word: { english: word.english, chinese: word.chinese, grade: word.grade }, mode };
                if (mode === 'choice') {
                    // 为看英选中题准备 4 个中文选项
                    const distract = generateDistractors(word, pool, 3);
                    const options = shuffleArray([word, ...distract]).map(o => o.chinese);
                    q.options = options;
                }
                return q;
            });

            currentQuestions = qs;
            currentAnswers = new Array(qs.length).fill(null);
            wrongWords = [];
            currentIdx = 0;
            correctSoFar = 0;
            practiceStartTime = new Date();
            practiceEndTime = null;
            currentStage = 'practice';
            answeredCurrent = false;

            // UI 切换
            document.getElementById('resultPanel').classList.remove('show');
            document.getElementById('celebration').classList.remove('show');
            document.getElementById('wordbookPanel').classList.remove('show');
            document.getElementById('practiceArea').classList.add('show');
            document.getElementById('btnNext').style.display = 'none';
            document.getElementById('btnNext').textContent = '✅ 下一题 (Enter)';
            updateStageIndicator();

            if (document.getElementById('timerEnable').checked) {
                startTimer();
            }

            renderCurrentQuestion();
        }

        // 仅练错题本的快捷入口
        function practiceWrongOnly() {
            document.getElementById('wrongOnly').checked = true;
            startNewPractice();
            document.getElementById('wrongOnly').checked = false;
        }

        // ============================================================
        // 渲染当前题目
        // ============================================================
        function renderCurrentQuestion() {
            if (currentIdx >= currentQuestions.length) {
                finishPractice();
                return;
            }

            const q = currentQuestions[currentIdx];
            const mode = q.mode;
            answeredCurrent = false;

            // 进度
            document.getElementById('progressInfo').textContent =
                `第 ${currentIdx + 1} / ${currentQuestions.length} 题 · 已对 ${correctSoFar} 题`;

            const prompt = document.getElementById('questionPrompt');
            const display = document.getElementById('wordDisplay');
            const hint = document.getElementById('wordHint');
            const input = document.getElementById('answerInput');
            const speakBtn = document.getElementById('speakBtn');
            const choiceBox = document.getElementById('choiceOptions');
            const feedback = document.getElementById('feedback');

            feedback.textContent = '';
            feedback.className = 'feedback';
            input.className = 'answer-input-large';
            input.value = '';
            input.disabled = false;
            choiceBox.innerHTML = '';
            choiceBox.style.display = 'none';
            speakBtn.style.display = 'none';

            if (mode === 'spell') {
                // 看中文拼英文：显示中文，输入英文
                prompt.textContent = '✍️ 请根据中文拼写出英文单词';
                display.textContent = q.word.chinese;
                display.className = 'word-display chinese';
                hint.innerHTML = `字母数：<span class="letter-count">${q.word.english.replace(/\s/g, '').length}</span> 个`;
                input.style.display = 'inline-block';
                input.placeholder = '在此输入英文...';
                setTimeout(() => input.focus(), 50);
            } else if (mode === 'choice') {
                // 看英文选中文：显示英文，4 个中文选项
                prompt.textContent = '📖 请选出对应的中文意思';
                display.textContent = q.word.english;
                display.className = 'word-display english';
                hint.innerHTML = '';
                input.style.display = 'none';
                choiceBox.style.display = 'grid';
                renderChoiceOptions(q);
                // 同时提供朗读
                speakBtn.style.display = 'inline-block';
            } else if (mode === 'dictation') {
                // 听写：不显示单词，朗读后让学生拼写
                prompt.textContent = '🔊 请点击喇叭听单词，然后拼写出来';
                display.textContent = ' 🔊 ';
                display.className = 'word-display';
                hint.innerHTML = '点击下方 🔊 听单词（如未朗读，请确认浏览器已开启语音权限）';
                input.style.display = 'inline-block';
                input.placeholder = '听到的单词...';
                speakBtn.style.display = 'inline-block';
                // 自动朗读一次
                setTimeout(() => speak(q.word.english), 300);
                setTimeout(() => input.focus(), 600);
            }

            document.getElementById('btnNext').style.display = 'none';
        }

        // 渲染选择题选项
        function renderChoiceOptions(q) {
            const box = document.getElementById('choiceOptions');
            box.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = opt;
                btn.onclick = () => answerChoice(opt, q);
                box.appendChild(btn);
            });
        }

        // ============================================================
        // 答题判定
        // ============================================================
        function answerChoice(selected, q) {
            if (answeredCurrent) return;
            answeredCurrent = true;

            const isRight = selected === q.word.chinese;
            const btns = document.querySelectorAll('.choice-btn');
            btns.forEach(b => {
                b.disabled = true;
                if (b.textContent === q.word.chinese) b.classList.add('correct');
                else if (b.textContent === selected && !isRight) b.classList.add('wrong');
            });

            recordAnswer({
                userAnswer: selected,
                correct: isRight,
                mode: 'choice'
            });
            showFeedback(isRight, q.word);
        }

        // 输入题（拼写 / 听写）的判定
        function answerInput() {
            if (answeredCurrent) return false;
            const q = currentQuestions[currentIdx];
            const input = document.getElementById('answerInput');
            const userVal = (input.value || '').trim();
            if (userVal === '') return false; // 不允许空提交

            answeredCurrent = true;
            // 大小写不敏感 + 去首尾空格 + 中间多空格允许
            const norm = s => s.toLowerCase().replace(/\s+/g, ' ').trim();
            const isRight = norm(userVal) === norm(q.word.english);
            input.disabled = true;
            input.classList.add(isRight ? 'correct' : 'wrong');

            recordAnswer({
                userAnswer: userVal,
                correct: isRight,
                mode: q.mode
            });
            showFeedback(isRight, q.word);
            return true;
        }

        function recordAnswer(ans) {
            currentAnswers[currentIdx] = ans;
            if (ans.correct) correctSoFar++;
        }

        function showFeedback(isRight, word) {
            const fb = document.getElementById('feedback');
            if (isRight) {
                fb.innerHTML = '✅ <span class="correct-word">' + word.english + '</span> 答对了！';
                fb.className = 'feedback correct';
            } else {
                fb.innerHTML = `❌ 正确答案：<span class="correct-word">${word.english}</span> （${word.chinese}）`;
                fb.className = 'feedback wrong';
                wrongWords.push({
                    word: { ...word },
                    userAnswer: currentAnswers[currentIdx].userAnswer,
                    mode: currentAnswers[currentIdx].mode
                });
                // 同步到错题本
                addToWordbook(word);
            }
            // 显示「下一题」按钮
            const btnNext = document.getElementById('btnNext');
            btnNext.style.display = 'inline-block';
            btnNext.textContent = (currentIdx + 1 >= currentQuestions.length) ? '📊 查看结果 (Enter)' : '✅ 下一题 (Enter)';
        }

        function checkAndNext() {
            const q = currentQuestions[currentIdx];
            if (!answeredCurrent) {
                // 输入题：先尝试判定
                if (q.mode !== 'choice') {
                    if (!answerInput()) return; // 输入为空时阻止
                } else {
                    return; // 选择题必须点选项
                }
            }
            currentIdx++;
            renderCurrentQuestion();
        }

        // 输入框回车
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('answerInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    checkAndNext();
                }
            });
        });

        // ============================================================
        // Web Speech API 朗读
        // ============================================================
        function speak(text, rate) {
            if (!('speechSynthesis' in window)) {
                alert('当前浏览器不支持语音朗读（Web Speech API）。请使用 Chrome/Edge。');
                return;
            }
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.rate = rate || 0.9;
            u.pitch = 1;
            window.speechSynthesis.speak(u);
        }

        function speakCurrentWord() {
            const q = currentQuestions[currentIdx];
            if (q) speak(q.word.english);
        }

        // ============================================================
        // 倒计时
        // ============================================================
        function startTimer() {
            const minutes = parseInt(document.getElementById('timerMinutes').value) || 10;
            timerTotalSeconds = minutes * 60;
            timerRemainingSeconds = timerTotalSeconds;
            updateTimerDisplay();
            document.getElementById('timerBar').classList.add('show');
            document.getElementById('timerBar').classList.remove('warning');

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerRemainingSeconds--;
                if (timerRemainingSeconds <= 0) {
                    timerRemainingSeconds = 0;
                    updateTimerDisplay();
                    stopTimer();
                    if (currentStage === 'practice') {
                        alert('⏱️ 时间到！自动结束练习。');
                        finishPractice();
                    }
                    return;
                }
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.getElementById('timerBar').classList.remove('show', 'warning');
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerRemainingSeconds / 60);
            const s = timerRemainingSeconds % 60;
            document.getElementById('timerTime').textContent =
                `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            const bar = document.getElementById('timerBar');
            if (timerRemainingSeconds <= 60) bar.classList.add('warning');
            else bar.classList.remove('warning');
        }

        function getElapsedSeconds() {
            const end = practiceEndTime || new Date();
            return Math.max(1, Math.round((end - practiceStartTime) / 1000));
        }

        function formatDuration(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return m > 0 ? `${m}分${s}秒` : `${s}秒`;
        }

        // ============================================================
        // 结束练习 → 显示结果
        // ============================================================
        function finishPractice() {
            // 处理未答的剩余题（计为未答）
            for (let i = currentIdx; i < currentQuestions.length; i++) {
                const q = currentQuestions[i];
                currentAnswers[i] = { userAnswer: '未作答', correct: false, mode: q.mode };
                wrongWords.push({ word: { ...q.word }, userAnswer: '未作答', mode: q.mode });
                addToWordbook(q.word);
            }

            currentStage = 'review';
            updateStageIndicator();
            stopTimer();
            practiceEndTime = new Date();

            const total = currentQuestions.length;
            const correct = correctSoFar;
            const wrong = total - correct;
            const unanswered = currentAnswers.filter(a => a && a.userAnswer === '未作答').length;
            const accuracy = total > 0 ? Math.round(correct / total * 100) : 0;

            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
            document.getElementById('unansweredCount').textContent = unanswered;
            document.getElementById('scoreText').textContent = accuracy;

            const elapsed = getElapsedSeconds();
            const timeStr = formatDuration(elapsed);

            const modeName = { spell: '看中拼英', choice: '看英选中', dictation: '听写' }[getSelectedMode()];

            document.getElementById('resultDetail').innerHTML =
                `<h3>📋 答题统计</h3>
                 <p>模式：${modeName} | 用时：约 ${timeStr} | 正确率：${accuracy}% | 错词：${wrongWords.length} 个</p>`;

            // 错词卡片
            const grid = document.getElementById('wrongGrid');
            if (wrongWords.length === 0) {
                grid.innerHTML = '<p style="text-align:center;color:#4CAF50;font-weight:bold;padding:10px;">🎉 全部正确，无错词！</p>';
                document.getElementById('celebration').classList.add('show');
                document.getElementById('celebrationText').textContent =
                    `${modeName}练习正确率 ${accuracy}%，继续加油！`;
            } else {
                grid.innerHTML = wrongWords.map(w => `
                    <div class="wrong-card">
                        <div class="wc-en">${escapeHtml(w.word.english)}</div>
                        <div class="wc-cn">${escapeHtml(w.word.chinese)}</div>
                        <div class="wc-ans">你的答案：<span class="mine">${escapeHtml(String(w.userAnswer))}</span> | 正确：<span class="right">${escapeHtml(w.word.english)}</span></div>
                    </div>
                `).join('');
            }

            document.getElementById('practiceArea').classList.remove('show');
            document.getElementById('resultPanel').classList.add('show');
            document.getElementById('btnNext').style.display = 'none';
            document.getElementById('btnPracticeWrong').style.display = wrongWords.length > 0 ? 'inline-block' : 'none';

            saveToHistory(correct, wrong, unanswered, accuracy, elapsed, modeName);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateStageIndicator() {
            const stages = ['stage1', 'stage2', 'stage3'];
            stages.forEach((s, i) => {
                const el = document.getElementById(s);
                el.classList.remove('active', 'completed');
                if (currentStage === 'practice' && i === 0) el.classList.add('active');
                else if (currentStage === 'review' && i === 1) el.classList.add('active');
                else if (currentStage === 'wordbook' && i === 2) el.classList.add('active');
                else if ((currentStage === 'review' && i === 0) ||
                         (currentStage === 'wordbook' && i < 2)) {
                    el.classList.add('completed');
                }
            });
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        // ============================================================
        // 错题本（localStorage 持久化）
        // ============================================================
        function getWordbook() {
            return JSON.parse(localStorage.getItem('englishWordbook') || '[]');
        }

        function addToWordbook(word) {
            const book = getWordbook();
            const exists = book.some(w => w.english.toLowerCase() === word.english.toLowerCase());
            if (!exists) {
                book.push({ english: word.english, chinese: word.chinese, grade: word.grade, wrongCount: 1, addedAt: Date.now() });
            } else {
                const w = book.find(w => w.english.toLowerCase() === word.english.toLowerCase());
                w.wrongCount = (w.wrongCount || 1) + 1;
            }
            localStorage.setItem('englishWordbook', JSON.stringify(book));
        }

        function showWordbook() {
            const book = getWordbook();
            currentStage = 'wordbook';
            updateStageIndicator();
            document.getElementById('wordbookPanel').classList.add('show');
            document.getElementById('wordbookInfo').textContent =
                `共 ${book.length} 个错词（按错误时间倒序，错误次数越多越靠前）`;
            const grid = document.getElementById('wordbookGrid');
            if (book.length === 0) {
                grid.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">错题本为空，快去练习吧！</p>';
                return;
            }
            // 按错误次数排序
            book.sort((a, b) => (b.wrongCount || 1) - (a.wrongCount || 1));
            grid.innerHTML = book.map(w => `
                <div class="wrong-card">
                    <div class="wc-en">${escapeHtml(w.english)}
                        <button class="speak-btn" style="width:30px;height:30px;font-size:14px;display:inline-block;vertical-align:middle;padding:0;margin-left:6px;"
                                onclick="speak('${escapeHtml(w.english)}')">🔊</button>
                    </div>
                    <div class="wc-cn">${escapeHtml(w.chinese)}（${GRADE_NAMES[w.grade] || '通用'}）</div>
                    <div class="wc-ans">错误 <span class="mine">${w.wrongCount || 1}</span> 次</div>
                </div>
            `).join('');
            window.scrollTo({ top: document.getElementById('wordbookPanel').offsetTop - 20, behavior: 'smooth' });
        }

        // ============================================================
        // 历史记录
        // ============================================================
        function saveToHistory(correct, wrong, unanswered, accuracy, elapsed, modeName) {
            const history = JSON.parse(localStorage.getItem('englishWordsHistory') || '[]');
            const record = {
                id: Date.now(),
                date: new Date().toLocaleString('zh-CN'),
                grade: GRADE_NAMES[parseInt(document.getElementById('gradeSelect').value)],
                mode: modeName,
                total: currentQuestions.length,
                correct, wrong, unanswered,
                accuracy,
                elapsedSeconds: elapsed,
                timeSpent: Math.max(1, Math.round(elapsed / 60)),
                wrongWords: wrongWords.map(w => ({
                    english: w.word.english,
                    chinese: w.word.chinese,
                    userAnswer: w.userAnswer
                }))
            };
            history.unshift(record);
            if (history.length > 20) history.pop();
            localStorage.setItem('englishWordsHistory', JSON.stringify(history));
        }

        function showHistory() {
            const history = JSON.parse(localStorage.getItem('englishWordsHistory') || '[]');
            const listEl = document.getElementById('historyList');
            if (history.length === 0) {
                listEl.innerHTML = '<div class="no-history">暂无历史记录</div>';
            } else {
                listEl.innerHTML = history.map(r => `
                    <div class="history-item">
                        <div class="history-header">
                            <span class="history-date">${r.date} · ${r.grade} · ${r.mode}</span>
                            <span class="history-score" style="color:${r.accuracy >= 90 ? '#4CAF50' : r.accuracy >= 60 ? '#FF9800' : '#f44336'}">${r.accuracy}%</span>
                        </div>
                        <div class="history-stats">
                            <span>✅${r.correct}/${r.total}</span>
                            <span>❌${r.wrong}</span>
                            <span>⏱️${formatDuration(r.elapsedSeconds)}</span>
                        </div>
                        ${r.wrongWords.length > 0 ? `
                            <div class="history-wrong-list">
                                <h4>❌ 错词（${r.wrongWords.length}）：</h4>
                                ${r.wrongWords.slice(0, 15).map(w => `
                                    <div class="wrong-word">
                                        <strong>${escapeHtml(w.english)}</strong>（${escapeHtml(w.chinese)}）—— 你写的：<span>${escapeHtml(String(w.userAnswer))}</span>
                                    </div>
                                `).join('')}
                                ${r.wrongWords.length > 15 ? `<div class="wrong-word">……还有 ${r.wrongWords.length - 15} 个</div>` : ''}
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            }
            document.getElementById('historyModal').classList.add('show');
        }

        function closeHistory() {
            document.getElementById('historyModal').classList.remove('show');
        }

        document.getElementById('historyModal').addEventListener('click', function(e) {
            if (e.target === this) closeHistory();
        });

        // ============================================================
        // 导出 / 打印
        // ============================================================
        function toCSVRow(arr) {
            return arr.map(v => {
                if (v == null) v = '';
                v = String(v);
                if (v.indexOf(',') >= 0 || v.indexOf('"') >= 0 || v.indexOf('\n') >= 0) {
                    return '"' + v.replace(/"/g, '""') + '"';
                }
                return v;
            }).join(',');
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function formatDateForFile() {
            const d = new Date();
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
        }

        // 导出错词本为 CSV
        function exportWrongWords() {
            const book = getWordbook();
            if (book.length === 0) {
                alert('错题本为空，无内容可导出。');
                return;
            }
            book.sort((a, b) => (b.wrongCount || 1) - (a.wrongCount || 1));
            const header = ['英文', '中文', '年级', '错误次数', '收录时间'];
            const rows = [toCSVRow(header)];
            book.forEach(w => {
                rows.push(toCSVRow([
                    w.english,
                    w.chinese,
                    GRADE_NAMES[w.grade] || '通用',
                    w.wrongCount || 1,
                    w.addedAt ? new Date(w.addedAt).toLocaleString('zh-CN') : '-'
                ]));
            });
            const csv = '﻿' + rows.join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            downloadBlob(blob, `英语错词本_${formatDateForFile()}.csv`);
        }

        // 打印 A4 单词试卷（看中文写英文，留空填答）
        function exportPaper() {
            const grade = parseInt(document.getElementById('gradeSelect').value);
            const pool = getWordPool();
            if (pool.length === 0) {
                alert('词汇范围为空。');
                return;
            }
            const count = Math.min(parseInt(document.getElementById('countSelect').value) || 20, pool.length);
            const qs = shuffleArray(pool).slice(0, count);
            const gradeName = GRADE_NAMES[grade];
            const range = document.getElementById('rangeSelect').value;
            const rangeName = { current: '本级', cumulative: '本级及以下', all: '全部' }[range];
            const now = new Date().toLocaleString('zh-CN');

            // 题目分列排版，每行 4 题（中文长，留答题空）
            const cols = 4;
            let rowsHtml = '';
            for (let i = 0; i < qs.length; i += cols) {
                const cells = [];
                for (let j = 0; j < cols && i + j < qs.length; j++) {
                    const w = qs[i + j];
                    const num = i + j + 1;
                    cells.push(`
                        <td>
                            <div class="qnum">${num}.</div>
                            <div class="qcn">${escapeHtml(w.chinese)}</div>
                            <div class="qline">&nbsp;</div>
                        </td>`);
                }
                rowsHtml += `<tr>${cells.join('')}</tr>`;
            }

            const html = `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
                <title>英语单词拼写测试卷 - ${gradeName}</title>
                <style>
                    body { font-family: 'Microsoft YaHei', sans-serif; padding: 15px; color:#222; }
                    h1 { text-align:center; font-size:18px; margin:0 0 4px; }
                    .info { text-align:center; font-size:12px; color:#666; margin-bottom:12px; }
                    table { width:100%; border-collapse:collapse; }
                    td { border:1px solid #999; padding:8px 6px; width:25%; vertical-align:top; }
                    .qnum { font-size:11px; color:#888; }
                    .qcn { font-size:14px; margin:4px 0; }
                    .qline { border-bottom:1px solid #333; min-height:22px; }
                    .footer { margin-top:15px; font-size:11px; color:#888; display:flex; justify-content:space-between; }
                    @page { size:A4; margin:10mm; }
                </style></head><body>
                <h1>📝 英语单词拼写测试卷</h1>
                <div class="info">${gradeName} · ${rangeName}词汇 | 共 ${count} 题 | 生成时间：${now}</div>
                <table>${rowsHtml}</table>
                <div class="footer">
                    <span>姓名：______________</span>
                    <span>用时：______ 分 ______ 秒</span>
                    <span>成绩：______ / ${count}</span>
                </div>
                <script>window.onload=function(){setTimeout(function(){window.print();},300);};<\/script>
                </body></html>`;

            const w = window.open('', '_blank');
            if (!w) {
                alert('弹出窗口被浏览器拦截，请允许弹出窗口后重试。');
                return;
            }
            w.document.open();
            w.document.write(html);
            w.document.close();
        }

        // ============================================================
        // 初始化
        // ============================================================
        window.onload = function() {
            onGradeChange();
            onTimerToggle();
        };
    </script>
</body>
</html>
